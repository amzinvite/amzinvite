# Publie automatiquement l'extension sur le Chrome Web Store à chaque push
# sur main. La version est extraite de src/manifest.json — bump-la avant
# chaque release sinon le CWS rejette.
#
# Secrets requis dans le repo GitHub (Settings → Secrets and variables → Actions) :
#   EXTENSION_ID     l'ID de l'extension donné par le CWS après la 1re soumission
#   CLIENT_ID        Google OAuth client ID (Cloud Console)
#   CLIENT_SECRET    Google OAuth client secret
#   REFRESH_TOKEN    OAuth refresh token (généré une fois manuellement)
#
# La 1re soumission de l'extension doit être faite manuellement via le
# Chrome Web Store Developer Dashboard. Ce workflow gère les UPDATES seulement.

name: Publish to Chrome Web Store

on:
  push:
    branches: [main]
    paths:
      - "src/**"
      - ".github/workflows/publish.yml"
  workflow_dispatch: # permet de relancer manuellement depuis l'UI GitHub

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read version from manifest
        id: version
        run: |
          VERSION=$(jq -r '.version' src/manifest.json)
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Publishing version $VERSION"

      - name: Build extension zip
        run: |
          cd src
          zip -r ../amzinvite.zip . -x "*.DS_Store" -x "*.map"
          cd ..
          ls -lh amzinvite.zip

      - name: Upload + publish to Chrome Web Store
        uses: mnao305/chrome-extension-upload@v5
        with:
          file-path: amzinvite.zip
          extension-id: ${{ secrets.EXTENSION_ID }}
          client-id: ${{ secrets.CLIENT_ID }}
          client-secret: ${{ secrets.CLIENT_SECRET }}
          refresh-token: ${{ secrets.REFRESH_TOKEN }}
          # publish: false → uploadé en draft, tu reviews+publish à la main
          # publish: true  → soumet direct au review CWS (auto-publish après review)
          publish: true
          glob: false

      - name: Tag release
        if: success()
        run: |
          git tag "v${{ steps.version.outputs.version }}" || true
          git push origin "v${{ steps.version.outputs.version }}" || true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
