<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <title>amzinvite</title>
    <style>
      :root {
        --bg: #f6f7fb;
        --surface: #ffffff;
        --border: #ebedf3;
        --border-strong: #d8dbe5;
        --text: #0f172a;
        --text-soft: #334155;
        --muted: #64748b;
        --brand: #111827;
        --brand-soft: #f3f4f6;
        --accent: #4f46e5;
        --green: #047857;
        --green-bg: #d1fae5;
        --amber: #b45309;
        --amber-bg: #fef3c7;
        --blue: #1d4ed8;
        --blue-bg: #dbeafe;
        --gray: #475569;
        --gray-bg: #f1f5f9;
        --red: #b91c1c;
        --red-bg: #fee2e2;
        --shadow-sm: 0 1px 2px rgba(15, 23, 42, 0.04);
      }
      @media (prefers-color-scheme: dark) {
        :root {
          --bg: #0f1115; --surface: #181b22; --border: #262a33;
          --border-strong: #343a47; --text: #e6e8ee; --text-soft: #c4c8d2;
          --muted: #8b91a0; --brand: #e6e8ee; --brand-soft: #1f232c;
          --accent: #818cf8; --green: #34d399; --green-bg: #052e1f;
          --amber: #fbbf24; --amber-bg: #3a2410; --blue: #60a5fa;
          --blue-bg: #0c2a3a; --gray: #94a3b8; --gray-bg: #1f232c;
          --red: #f87171; --red-bg: #3f1414;
        }
      }
      * { box-sizing: border-box; }
      body {
        font: 13px/1.5 -apple-system, BlinkMacSystemFont, "SF Pro Text", "Inter", system-ui, sans-serif;
        margin: 0; width: 400px;
        background: var(--bg); color: var(--text); -webkit-font-smoothing: antialiased;
      }
      header {
        padding: 16px 18px 14px;
        background: var(--surface);
        border-bottom: 1px solid var(--border);
      }
      header h1 {
        margin: 0; font-size: 15px; font-weight: 700;
        letter-spacing: -0.015em;
        display: flex; align-items: center; gap: 9px;
      }
      header h1 .logo {
        display: inline-flex; align-items: center; justify-content: center;
        width: 24px; height: 24px; background: var(--brand-soft);
        border-radius: 7px; font-size: 13px;
      }
      header .sub { margin-top: 6px; font-size: 12px; color: var(--text-soft); font-weight: 500; }
      header .meta { margin-top: 2px; font-size: 10.5px; color: var(--muted); font-variant-numeric: tabular-nums; }

      section { padding: 14px 16px; background: var(--surface); border-bottom: 1px solid var(--border); }
      section.collapse-target { display: none; }
      section.collapse-target.open { display: block; }

      .summary-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 12px; }
      .stat {
        background: var(--surface); border: 1px solid var(--border); border-radius: 10px;
        padding: 10px 6px; text-align: center; box-shadow: var(--shadow-sm);
      }
      .stat .n { font-size: 20px; font-weight: 700; line-height: 1; font-variant-numeric: tabular-nums; letter-spacing: -0.02em; }
      .stat .l { font-size: 9.5px; color: var(--muted); margin-top: 5px; text-transform: uppercase; letter-spacing: 0.06em; font-weight: 600; }
      .stat.ok .n { color: var(--green); }
      .stat.warn .n { color: var(--amber); }
      .stat.info .n { color: var(--blue); }

      label.field {
        display: block; font-size: 10.5px; color: var(--muted);
        margin-top: 12px; margin-bottom: 4px;
        text-transform: uppercase; letter-spacing: 0.06em; font-weight: 600;
      }
      input[type="text"], input[type="number"], input[type="url"] {
        width: 100%; padding: 9px 11px; font-size: 12.5px; font-family: inherit;
        color: var(--text); background: var(--surface);
        border: 1px solid var(--border-strong); border-radius: 8px;
      }
      input:focus { outline: none; border-color: var(--text); box-shadow: 0 0 0 3px var(--brand-soft); }

      .toggle-row {
        display: flex; align-items: flex-start; gap: 10px; margin-top: 14px;
        padding: 12px; background: var(--brand-soft); border: 1px solid var(--border);
        border-radius: 10px; cursor: pointer;
      }
      .toggle-row.warn { background: var(--amber-bg); border-color: var(--amber); }
      .toggle-row input { margin: 2px 0 0; accent-color: var(--text); }
      .toggle-row b { font-weight: 600; font-size: 12.5px; }
      .toggle-row .hint { display: block; color: var(--muted); font-size: 11px; margin-top: 3px; line-height: 1.45; }
      .toggle-row.warn .hint { color: var(--amber); opacity: 0.9; }

      .actions { display: flex; gap: 8px; margin-top: 14px; }
      button {
        flex: 1; padding: 10px 14px; font-size: 12.5px; font-weight: 600;
        font-family: inherit; border: 1px solid var(--border-strong); border-radius: 9px;
        background: var(--surface); color: var(--text); cursor: pointer;
        transition: all 0.12s;
      }
      button:hover { background: var(--gray-bg); transform: translateY(-1px); }
      button:disabled { opacity: 0.55; cursor: wait; transform: none; }
      button.primary { background: var(--brand); color: var(--surface); border-color: var(--brand); }
      button.ghost { flex: 0 0 auto; padding: 8px 12px; font-size: 13px; }
      button.danger { background: var(--red-bg); color: var(--red); border-color: var(--red-bg); flex: 0 0 auto; padding: 7px 10px; font-size: 11px; }

      .status-line {
        font-size: 11px; color: var(--muted); margin-top: 10px;
        font-variant-numeric: tabular-nums; display: flex; align-items: center; gap: 6px;
      }
      .status-line::before {
        content: ""; width: 6px; height: 6px; border-radius: 50%;
        background: var(--green); box-shadow: 0 0 8px var(--green);
        animation: pulse 2.5s ease-in-out infinite;
      }
      @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.45; } }

      .list-header {
        display: flex; align-items: center; justify-content: space-between;
        padding: 10px 16px; background: var(--bg);
        font-size: 10.5px; color: var(--muted);
        text-transform: uppercase; letter-spacing: 0.06em; font-weight: 600;
      }
      .show-all-toggle {
        display: inline-flex; align-items: center; gap: 6px; font-size: 11px;
        text-transform: none; letter-spacing: 0; font-weight: 500; cursor: pointer; color: var(--text-soft);
      }
      .show-all-toggle input { margin: 0; accent-color: var(--text); }

      ul.products { list-style: none; padding: 0; margin: 0; max-height: 340px; overflow-y: auto; background: var(--surface); }
      li.product {
        display: flex; align-items: center; gap: 10px;
        padding: 11px 16px; border-bottom: 1px solid var(--border);
        background: var(--surface);
      }
      li.product:hover { background: var(--bg); }
      li.product:last-child { border-bottom: none; }
      li.product .body { flex: 1; min-width: 0; }
      li.product .name {
        font-size: 12.5px; font-weight: 500; line-height: 1.35; color: var(--text);
        overflow: hidden; text-overflow: ellipsis;
        display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;
      }
      li.product .link { font-size: 10.5px; color: var(--muted); margin-top: 3px; font-variant-numeric: tabular-nums; }
      li.product a { color: inherit; text-decoration: none; }
      li.product a:hover { color: var(--text); text-decoration: underline; }
      li.product .remove {
        background: transparent; border: none; color: var(--muted);
        cursor: pointer; padding: 4px 6px; font-size: 14px; flex: 0;
        border-radius: 4px;
      }
      li.product .remove:hover { background: var(--red-bg); color: var(--red); transform: none; }

      li.product:has(.pill.accepted) {
        background: linear-gradient(90deg, color-mix(in srgb, var(--green-bg) 60%, transparent), transparent);
        border-left: 3px solid var(--green); padding-left: 13px;
      }
      li.product:has(.pill.accepted) .name { font-weight: 600; }

      .pill {
        display: inline-flex; align-items: center; gap: 4px;
        padding: 4px 9px; font-size: 10.5px; font-weight: 700;
        border-radius: 999px; white-space: nowrap; flex-shrink: 0;
      }
      .pill.available         { background: var(--amber-bg); color: var(--amber); }
      .pill.already_requested { background: var(--blue-bg);  color: var(--blue);  }
      a.pill.accepted, .pill.accepted {
        background: var(--green); color: white;
        animation: glow 1.8s ease-in-out infinite; text-decoration: none;
      }
      a.pill.accepted { cursor: pointer; transition: filter 0.12s, transform 0.12s; }
      a.pill.accepted:hover { filter: brightness(1.08); transform: translateY(-1px); }
      @keyframes glow {
        0%, 100% { box-shadow: 0 0 0 0 rgba(4, 120, 87, 0.45); }
        50%      { box-shadow: 0 0 0 5px rgba(4, 120, 87, 0); }
      }
      .pill.not_invitation { background: var(--gray-bg); color: var(--gray); }
      .pill.unknown { background: var(--gray-bg); color: var(--gray); }
      .pill.checking { background: var(--gray-bg); color: var(--muted); }
      .pill.error { background: var(--red-bg); color: var(--red); }

      .empty { padding: 36px 16px; text-align: center; color: var(--muted); font-size: 12.5px; background: var(--surface); }
      .empty .big { font-size: 36px; margin-bottom: 8px; opacity: 0.8; }

      .err { color: var(--red); background: var(--red-bg); padding: 10px 12px; margin-top: 10px;
        border-radius: 8px; font-size: 11.5px; border-left: 3px solid var(--red); }
      .err:empty { display: none; }

      .add-form { display: flex; gap: 6px; margin-top: 10px; }
      .add-form input { flex: 1; }
      .add-form button { flex: 0 0 auto; padding: 9px 14px; }

      .footer-actions {
        display: flex; justify-content: space-between; align-items: center;
        padding: 8px 16px; font-size: 11px; color: var(--muted);
        background: var(--bg);
      }
      .footer-actions a { color: var(--muted); text-decoration: none; }
      .footer-actions a:hover { color: var(--text); text-decoration: underline; }
    </style>
  </head>
  <body>
    <header>
      <h1><span class="logo">🎟️</span> amzinvite</h1>
      <div class="sub" id="sub">Chargement…</div>
      <div class="meta" id="version">Version —</div>
    </header>

    <section>
      <div class="summary-grid">
        <div class="stat warn"><div class="n" id="stat-available">—</div><div class="l">Dispo</div></div>
        <div class="stat info"><div class="n" id="stat-requested">—</div><div class="l">Demandées</div></div>
        <div class="stat"><div class="n" id="stat-total">—</div><div class="l">Total</div></div>
      </div>

      <div class="actions">
        <button class="primary" id="check">Vérifier maintenant</button>
        <button class="ghost" id="toggle-settings" title="Paramètres">⚙️</button>
      </div>
      <div class="status-line" id="next-check">Prochain check auto : —</div>
      <div class="err" id="err"></div>
    </section>

    <section id="settings" class="collapse-target">
      <label class="field" for="intervalMin">Intervalle de check (min)</label>
      <input id="intervalMin" type="number" min="5" placeholder="30" />

      <label class="field">Ajouter un produit Amazon manuellement</label>
      <div class="add-form">
        <input id="addUrl" type="url" placeholder="https://www.amazon.fr/dp/B0XXXXXXXX" />
        <button class="primary" id="addBtn">Ajouter</button>
      </div>

      <label class="toggle-row warn">
        <input id="autoRequest" type="checkbox" />
        <span>
          <b>⚠️ Auto-demander les invitations</b>
          <span class="hint">
            POST direct à Amazon dès qu'un produit passe à "dispo". Discret
            (aucune fenêtre), mais peut violer les TOS Amazon — utilisation à
            tes risques. 1 tentative/h max par produit.
          </span>
        </span>
      </label>

      <label class="toggle-row">
        <input id="telemetryEnabled" type="checkbox" />
        <span>
          <b>Aider la communauté (anonyme)</b>
          <span class="hint">
            Partage les détections d'état (ASIN + état + horodatage) avec un
            UUID anonyme pour améliorer le feed pour tout le monde. Aucune
            donnée perso. Voir privacy policy.
          </span>
        </span>
      </label>

      <label class="toggle-row">
        <input id="scrapeEnabled" type="checkbox" />
        <span>
          <b>Contribuer au catalogue Amazon</b>
          <span class="hint">
            Quand tu visites une page produit ou de recherche Amazon, partage
            de manière anonyme les ASINs, prix et stocks observés. Pas
            d'identifiant associé. Hors par défaut.
          </span>
        </span>
      </label>

      <div class="actions">
        <button class="primary" id="save">Enregistrer</button>
        <button class="danger" id="reset" title="Reset complet (instanceId, watchlist custom, états)">Reset</button>
      </div>
    </section>

    <div class="list-header" id="list-header">
      <span id="list-title">Suivi</span>
      <label class="show-all-toggle">
        <input type="checkbox" id="showAll" />
        <span>Tout afficher</span>
      </label>
    </div>
    <ul class="products" id="list"></ul>
    <div class="empty" id="empty" style="display:none;">
      <div class="big">📭</div>
      Aucun produit en mode invitation pour le moment.<br/>
      <span style="font-size:11px; opacity:0.75">Ajoute-en un manuellement ou attends le feed communautaire.</span>
    </div>

    <div class="footer-actions">
      <a href="https://amzinvite.example.com/privacy" target="_blank">Privacy</a>
      <a href="https://github.com/yourname/amzinvite" target="_blank">GitHub</a>
    </div>

    <script src="popup.js"></script>
  </body>
</html>
